# Configuration du bot de veille des bons plans.
#
# Chaque entrée de "watches" est une recherche indépendante :
#   - keywords  : au moins un de ces mots doit apparaître dans le titre
#   - exclude   : aucun de ces mots ne doit apparaître (filtre les portables, etc.)
#   - min_price : prix minimum en euros (null = pas de plancher)
#   - max_price : prix maximum en euros (null = pas de limite)
#   - sources   : labels de flux auxquels la recherche se limite (vide = tous)
#
# Le routage "recherche -> destinataires Discord" se configure côté LegumBot
# (DEAL_ROUTES dans TOKEN.py), par nom de watch.

database: data/deals.db

scrapers:
  dealabs:
    enabled: true
    # Une URL simple a le label par défaut "dealabs" ; la forme
    # {url, label} donne au flux un label ciblable par les watches.
    feed_urls:
      - url: "https://www.dealabs.com/rss/groupe/ordinateurs-de-bureau"
        label: "dealabs-pc"
      - url: "https://www.dealabs.com/rss/groupe/informatique"
        label: "dealabs-informatique"
      - url: "https://www.dealabs.com/rss/groupe/casques-audio"
        label: "dealabs-audio"
      - url: "https://www.dealabs.com/rss/groupe/accessoires-gaming"
        label: "dealabs-gaming"
      - url: "https://www.dealabs.com/rss/groupe/enceintes-bluetooth"
        label: "dealabs-enceinte"
      - url: "https://www.dealabs.com/rss/groupe/appareils-photo"
        label: "dealabs-photo"

# Canaux de notification. Les ${VAR} sont lues dans les variables
# d'environnement pour ne pas versionner de secrets.
notifiers:
  console:
    enabled: true
  discord:
    enabled: false
    webhook_url: "${DISCORD_WEBHOOK_URL}"
  telegram:
    enabled: false
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    chat_id: "${TELEGRAM_CHAT_ID}"

watches:
  - name: "Config complète"
    sources: ["dealabs-pc", "dealabs-informatique"]   # uniquement les flux PC, pas l'audio/gaming
    keywords:
      - "pc fixe"
      - "pc gamer"
      - "pc gaming"
      - "gaming pc"
      - "pc complet"
      - "pc de bureau"
      - "pc bureau"
      - "unité centrale"
      - "desktop"
      - "tour gamer"
      - "pc tour"
    exclude:
      - "portable"
      - "laptop"
      - "notebook"
      - "chromebook"
      - "mini pc"
      - "mini-pc"
      - "all-in-one"
      - "tout-en-un"
    max_price: null   # budget illimité pour l'instant

  - name: "Enceinte portable"
    sources: ["dealabs-enceinte"]
    keywords:
      - "enceinte portable"
    exclude:
      - "colonne"
      - "amplificateur"
    min_price: 80
    max_price: 170

  - name: "Mémoire RAM"
    sources: ["dealabs-informatique"]
    keywords:
      - "mémoire"
      - "barrette"
    exclude:
      - "carte mémoire"
    min_price: 50
    max_price: 200

  - name: "Appareil photo"
    sources: ["dealabs-photo"]
    keywords:
      - "appareil photo"
      - "reflex"
      - "hybride"
      - "bridge"
      - "compact"
      - "instantané"
      - "instax"
      - "polaroid"
      - "kodak"
      - "canon"
      - "nikon"
      - "sony"
      - "fujifilm"
      - "fuji"
      - "lumix"
      - "panasonic"
      - "olympus"
      - "leica"
      - "pentax"
      - "gopro"
    exclude:
      - "objectif"
      - "trépied"
      - "carte mémoire"
      - "sacoche"
      - "batterie"
      - "chargeur"
      - "flash"
    min_price: 50
    max_price: 200
