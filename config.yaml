# Configuration du bot de veille des bons plans PC.
#
# Chaque entrée de "watches" est une recherche indépendante :
#   - keywords : au moins un de ces mots doit apparaître dans le titre
#   - exclude  : aucun de ces mots ne doit apparaître (filtre les portables, etc.)
#   - max_price : prix maximum en euros (null = pas de limite)

database: data/deals.db

scrapers:
  dealabs:
    enabled: true
    # Flux RSS du groupe informatique de Dealabs
    feed_url: "https://www.dealabs.com/rss/groupe/informatique"

# Canaux de notification. Les ${VAR} sont lues dans les variables
# d'environnement pour ne pas versionner de secrets.
notifiers:
  console:
    enabled: true
  discord:
    enabled: false
    webhook_url: "${DISCORD_WEBHOOK_URL}"
  telegram:
    enabled: false
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    chat_id: "${TELEGRAM_CHAT_ID}"

# NB : la correspondance se fait par sous-chaîne dans le titre.
# Ne jamais mettre un mot-clé trop court/générique comme "pc" seul,
# sinon "Écran PC", "Boîtier PC", etc. matchent aussi.
watches:
  - name: "Config complète"
    keywords:
      - "pc fixe"
      - "pc gamer"
      - "pc gaming"
      - "gaming pc"
      - "pc complet"
      - "pc de bureau"
      - "pc bureau"
      - "unité centrale"
      - "desktop"
      - "tour gamer"
      - "pc tour"
    exclude:
      # pas un PC fixe
      - "portable"
      - "laptop"
      - "notebook"
      - "mini pc"
      # périphériques et composants vendus seuls
      - "écran"
      - "ecran"
      - "moniteur"
      - "clavier"
      - "souris"
      - "boîtier"
      - "boitier"
      - "alimentation"
      - "processeur"
      - "carte graphique"
      - "carte mère"
      - "carte mere"
      - "ventirad"
      - "watercooling"
      - "casque"
      - "manette"
      - "webcam"
      - "imprimante"
      - "chaise"
      - "bureau assis"
      - "tapis"
    max_price: null   # budget illimité pour l'instant
